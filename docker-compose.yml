version: '3.8'

services:
  db:
    image: postgres:15
    container_name: photobooth-postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: photobooth-backend
    ports:
      - "3000:3000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: photobooth-frontend
    ports:
      - "5173:5173"

volumes:
  pgdata: